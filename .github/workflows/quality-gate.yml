name: 品質ゲート

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v7

      - name: Pythonを準備
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 依存ライブラリを導入
        run: python -m pip install -r requirements.txt

      - name: 游ゴシックを確認
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:WINDIR\Fonts\YuGothR.ttc")) {
            throw "游ゴシックが見つかりません"
          }

      - name: 全テストを実行
        shell: pwsh
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          python -m compileall -q slidegen
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem slidegen\test_*.py | Sort-Object Name | ForEach-Object {
            Write-Host "==> $($_.Name)"
            python $_.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: 主要デッキを生成して機械検証
        shell: pwsh
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          python slidegen\generate.py out\basic.pptx
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python slidegen\generate2.py out\extended.pptx
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python slidegen\generate_patterns.py out\pattern_gallery.pptx
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python slidegen\generate_lead_patterns.py out\lead_gallery.pptx
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python slidegen\generate_stress_patterns.py out\stress_gallery.pptx
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem out\*.pptx | ForEach-Object {
            python slidegen\check_layout.py $_.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: 差分の空白エラーを確認
        run: git diff --check
